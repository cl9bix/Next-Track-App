services:
  postgres:
    image: postgres:16-alpine
    container_name: next_track_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cl9bix
      POSTGRES_PASSWORD: cl9bix_pass
      POSTGRES_DB: next_track_db
    ports:
      - "5950:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: next-track-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--port", "6379"]
    ports:
      - "6380:6379"

volumes:
  pgdata: